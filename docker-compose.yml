services:
  vl-render:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped

    # Coolify si to routuje přes reverse proxy; expose je ideální pro interní síť.
    expose:
      - "8000"

    environment:
      PYTHONUNBUFFERED: "1"

    # Healthcheck bez curl/wget (využije python v image)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
